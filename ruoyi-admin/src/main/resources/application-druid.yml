# 数据源配置
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.ibm.db2.jcc.DB2Driver
        url: jdbc:db2://localhost:50000/ruoyi:currentSchema=RY;connectTimeout=30000;socketTimeout=60000;
        username: db2inst1
        password: 123456
        druid:
            # 修正：initialSize ≥ minIdle，避免逻辑矛盾
            initialSize: 10
            minIdle: 10
            maxActive: 20
            maxWait: 60000
            timeBetweenEvictionRunsMillis: 60000
            minEvictableIdleTimeMillis: 300000
            maxEvictableIdleTimeMillis: 900000
            validationQuery: SELECT 1 FROM SYSIBM.SYSDUMMY1
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            # 配置连接超时时间
            connectTimeout: 30000
            # 配置网络超时时间
            socketTimeout: 60000
            webStatFilter:
                enabled: true
            statViewServlet:
                enabled: true
                allow:
                url-pattern: /druid/*
                login-username: ruoyi
                login-password: 123456
            filter:
                stat:
                    enabled: true
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true